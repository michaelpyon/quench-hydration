<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Quench. Drink water on rhythm. SMS-first hydration reminders.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g opacity="0.18" fill="#ffffff">
    <circle cx="980" cy="120" r="6"/>
    <circle cx="1080" cy="200" r="4"/>
    <circle cx="940" cy="260" r="3"/>
    <circle cx="1130" cy="380" r="5"/>
    <circle cx="120" cy="540" r="4"/>
    <circle cx="220" cy="490" r="3"/>
  </g>

  <g transform="translate(80, 90)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="56" height="56" rx="16" fill="#ffffff"/>
      <text x="28" y="40" font-size="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif">💧</text>
    </g>
    <text x="76" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="600" fill="#ffffff" letter-spacing="-1">Quench</text>
  </g>

  <g transform="translate(80, 230)">
    <text font-family="Georgia, 'Times New Roman', serif" font-weight="500" fill="#ffffff" letter-spacing="-3">
      <tspan x="0" y="0" font-size="116">Drink water</tspan>
      <tspan x="0" y="124" font-size="116" font-style="italic" fill="#bae6fd">on rhythm.</tspan>
    </text>
  </g>

  <g transform="translate(80, 510)">
    <rect x="0" y="0" width="14" height="14" rx="999" fill="#bae6fd"/>
    <text x="28" y="13" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#e0f2fe" font-weight="500">SMS-first hydration. 60-second quiz. No app.</text>
  </g>

  <g transform="translate(900, 320)">
    <circle r="160" fill="#ffffff" fill-opacity="0.08"/>
    <circle r="120" fill="#ffffff" fill-opacity="0.08"/>
    <circle r="80" fill="#ffffff" fill-opacity="0.12"/>
    <text x="0" y="32" font-size="160" text-anchor="middle">💧</text>
  </g>
</svg>
